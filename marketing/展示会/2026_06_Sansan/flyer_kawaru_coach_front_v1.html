<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Kawaru Coach フライヤー表面 v1</title>
<style>
  @page { size: A4; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple:      #7C3AED;
    --purple-dark: #1E0A3C;
    --white:       #ffffff;
    --yellow:      #FFD44A;
  }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: #e0e0e0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .flyer {
    width: 210mm;
    height: 297mm;
    background: #7C3AED;
    position: relative;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12mm 14mm;
    overflow: hidden;
  }

  /* ========== Header ========== */
  .header {
    display: flex;
    align-items: center;
    gap: 3mm;
    width: 100%;
  }
  .logo-k {
    width: 11mm; height: 11mm;
    background: var(--white);
    border-radius: 2mm;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple); font-weight: 900; font-size: 15pt;
  }
  .logo-text {
    font-size: 13pt;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 1px;
  }
  .tag {
    margin-left: auto;
    border: 1px solid rgba(255,255,255,0.5);
    color: var(--white);
    padding: 1.5mm 3.5mm;
    border-radius: 20mm;
    font-size: 7.5pt;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* ========== Main copy（中央の一言） ========== */
  .main-copy {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .catch-main {
    font-size: 32pt;
    font-weight: 900;
    color: var(--white);
    line-height: 1.55;
    letter-spacing: -0.5px;
    text-align: center;
  }
  .catch-main .deco {
    display: inline-block;
    font-size: 30pt;
  }
  .catch-main .em {
  }

  /* ========== Footer（中央揃え） ========== */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5mm;
    padding-top: 6mm;
    border-top: 1px solid rgba(255,255,255,0.25);
    width: 100%;
  }
  .company {
    font-size: 8pt;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    text-align: center;
    line-height: 1.7;
  }
  .company .co-name {
    font-size: 10pt;
    font-weight: 900;
    color: var(--white);
    display: block;
    margin-bottom: 1mm;
  }
  .lead-to-back {
    font-size: 10pt;
    font-weight: 800;
    color: var(--yellow);
    display: flex;
    align-items: center;
    gap: 2mm;
    letter-spacing: 0.5px;
  }
  .lead-to-back .arrow { font-size: 13pt; }
</style>
</head>
<body>
<div class="flyer">

  <!-- Header -->
  <div class="header">
    <div class="logo-k">K</div>
    <div class="logo-text">Kawaru Coach</div>
    <div class="tag">AI顧問サービス</div>
  </div>

  <!-- 中央の一言 -->
  <div class="main-copy">

    <!-- ========== 案A-1（現在表示） ========== -->
    <h1 class="catch-main">
      <span class="deco">「AIは誰がやるの？」</span><br>
      ——その問いに、まだ<br>
      <span class="em">答えが出ていませんか？</span>
    </h1>

    <!-- 案A-2: 「AI活用したい」は、ある。「一緒にやる人」が、いない。
    <h1 class="catch-main">
      <span class="deco">「AI活用したい」</span>は、ある。<br>
      「一緒にやる人」が、<br>
      <span class="em">いない。</span>
    </h1>
    -->

    <!-- 案B-1: 外部に頼んでも「提案書だけ」で終わる——それが、AI活用が進まない本当の理由。
    <h1 class="catch-main">
      外部に頼んでも<span class="deco">「提案書だけ」</span>で<br>
      終わる——それが、<br>
      <span class="em">AI活用が進まない理由。</span>
    </h1>
    -->

    <!-- 案C-1: 社内に1人、AIのプロがいたら——貴社のAI活用は、もう動き出せる。
    <h1 class="catch-main">
      社内に<span class="deco">1人、AIのプロ</span>が<br>
      いたら——貴社のAI活用は、<br>
      <span class="em">もう動き出せる。</span>
    </h1>
    -->

    <!-- 案D-1: AI顧問は「助言者」じゃない。実行まで一緒に動く「実行パートナー」です。
    <h1 class="catch-main">
      AI顧問は<span class="deco">「助言者」</span>じゃない。<br>
      実行まで一緒に動く<br>
      <span class="em">「実行パートナー」</span>です。
    </h1>
    -->

  </div>

  <!-- Footer（中央揃え） -->
  <div class="footer">
    <div class="company">
      <span class="co-name">株式会社エヌイチ</span>
      Kawaru事業部
    </div>
    <div class="lead-to-back">
      気になる方は裏面へ <span class="arrow">▼</span>
    </div>
  </div>

</div>
</body>
</html>
