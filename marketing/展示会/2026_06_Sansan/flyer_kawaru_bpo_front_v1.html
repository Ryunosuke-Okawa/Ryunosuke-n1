<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Kawaru BPO フライヤー表面 v1</title>
<style>
  @page { size: A4; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:      #10BF16;
    --green-dark: #0A5208;
    --white:      #ffffff;
    --yellow:     #FFD44A;
  }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: #e0e0e0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .flyer {
    width: 210mm;
    height: 297mm;
    background: #10BF16;
    position: relative;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12mm 14mm;
    overflow: hidden;
  }

  /* ========== Header ========== */
  .header {
    display: flex;
    align-items: center;
    gap: 3mm;
    width: 100%;
  }
  .logo-k {
    width: 11mm; height: 11mm;
    background: var(--white);
    border-radius: 2mm;
    display: flex; align-items: center; justify-content: center;
    color: var(--green); font-weight: 900; font-size: 15pt;
  }
  .logo-text {
    font-size: 13pt;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 1px;
  }
  .tag {
    margin-left: auto;
    border: 1px solid rgba(255,255,255,0.5);
    color: var(--white);
    padding: 1.5mm 3.5mm;
    border-radius: 20mm;
    font-size: 7.5pt;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* ========== Main copy ========== */
  .main-copy {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .catch-main {
    font-size: 32pt;
    font-weight: 900;
    color: var(--white);
    line-height: 1.55;
    letter-spacing: -0.5px;
    text-align: center;
  }
  .catch-main .deco {
    display: inline-block;
    background: var(--yellow);
    color: var(--green-dark);
    padding: 0 2mm;
    border-radius: 1.5mm;
    font-size: 30pt;
  }
  .catch-main .em {
    border-bottom: 3px solid var(--yellow);
  }

  /* ========== Footer ========== */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5mm;
    padding-top: 6mm;
    border-top: 1px solid rgba(255,255,255,0.25);
    width: 100%;
  }
  .company {
    font-size: 8pt;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    text-align: center;
    line-height: 1.7;
  }
  .company .co-name {
    font-size: 10pt;
    font-weight: 900;
    color: var(--white);
    display: block;
    margin-bottom: 1mm;
  }
  .lead-to-back {
    font-size: 10pt;
    font-weight: 800;
    color: var(--yellow);
    display: flex;
    align-items: center;
    gap: 2mm;
    letter-spacing: 0.5px;
  }
  .lead-to-back .arrow { font-size: 13pt; }
</style>
</head>
<body>
<div class="flyer">

  <!-- Header -->
  <div class="header">
    <div class="logo-k">K</div>
    <div class="logo-text">Kawaru BPO</div>
    <div class="tag">AI導入・業務改善コンサルティング</div>
  </div>

  <!-- 中央の一言 -->
  <div class="main-copy">

    <!-- ========== 案A-1（現在表示） ========== -->
    <h1 class="catch-main">
      <span class="deco">「業務改善、やりたい」</span><br>
      ——でも、手が回らない。<br>
      <span class="em">だから、丸ごと任せてください。</span>
    </h1>

    <!-- 案A-2: AIを入れたけど「活用が進まない」——そのまま放置していませんか？
    <h1 class="catch-main">
      AIを入れたけど<span class="deco">「活用が進まない」</span><br>
      ——そのまま<br>
      <span class="em">放置していませんか？</span>
    </h1>
    -->

    <!-- 案B-1: 御社はヒアリングに答えるだけ。残りは全部、任せてください。
    <h1 class="catch-main">
      御社は<span class="deco">ヒアリングに答えるだけ。</span><br>
      残りは全部、<br>
      <span class="em">任せてください。</span>
    </h1>
    -->

    <!-- 案C-1: 「業務改善の担当者がいない」——それ、私たちが丸ごと代行します。
    <h1 class="catch-main">
      <span class="deco">「業務改善の担当者がいない」</span><br>
      ——それ、<br>
      <span class="em">私たちが丸ごと代行します。</span>
    </h1>
    -->

    <!-- 案D-1: AI業務改善を「最短1週間」で動かす、専任チームがいます。
    <h1 class="catch-main">
      AI業務改善を<span class="deco">「最短1週間」</span>で<br>
      動かす、専任チームが<br>
      <span class="em">います。</span>
    </h1>
    -->

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="company">
      <span class="co-name">株式会社エヌイチ</span>
      Kawaru事業部
    </div>
    <div class="lead-to-back">
      気になる方は裏面へ <span class="arrow">▼</span>
    </div>
  </div>

</div>
</body>
</html>
